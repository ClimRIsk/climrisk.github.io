name: Deploy climrisk.io

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: climrisk-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: climrisk-web

      - name: Build Next.js static export
        run: npm run build
        working-directory: climrisk-web

      # Override with our standalone HTML files — these take priority over Next.js output
      - name: Copy standalone HTML files into build output
        run: |
          cp index.html              climrisk-web/out/index.html
          cp app.html                climrisk-web/out/app.html
          cp dashboard.html          climrisk-web/out/dashboard.html
          cp CRI_Demo.html           climrisk-web/out/CRI_Demo.html
          cp ClimRisk_Platform.html  climrisk-web/out/ClimRisk_Platform.html
        continue-on-error: true   # graceful if any file was removed

      # GitHub Pages needs a CNAME file for the custom domain
      - name: Write CNAME
        run: echo "climrisk.io" > climrisk-web/out/CNAME

      # Next.js puts assets in _next/ — disable Jekyll so GitHub Pages serves as-is
      - name: Add .nojekyll
        run: touch climrisk-web/out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: climrisk-web/out
          cname: climrisk.io
