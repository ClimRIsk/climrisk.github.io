<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <!-- C arc: emerald → blue -->
  <linearGradient id="g-arc" x1="0.2" y1="0" x2="0.8" y2="1">
    <stop offset="0%"   stop-color="#10b981"/>
    <stop offset="48%"  stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <!-- Globe: dark navy radial -->
  <radialGradient id="g-globe" cx="36%" cy="34%" r="70%">
    <stop offset="0%"   stop-color="#0e2040"/>
    <stop offset="100%" stop-color="#010914"/>
  </radialGradient>
  <!-- R: light-blue → deep-blue -->
  <linearGradient id="g-r" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#7dd3fc"/>
    <stop offset="100%" stop-color="#1d4ed8"/>
  </linearGradient>
  <!-- Bars: dark-green → bright-green -->
  <linearGradient id="g-bar" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#047857"/>
    <stop offset="100%" stop-color="#34d399"/>
  </linearGradient>
  <!-- Arc outer glow -->
  <filter id="f-arc" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Dot glow -->
  <filter id="f-dot" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Globe clip -->
  <clipPath id="cp-g">
    <circle cx="86" cy="96" r="52"/>
  </clipPath>
</defs>

<!-- ── Globe base ── -->
<circle cx="86" cy="96" r="52" fill="url(#g-globe)"/>
<!-- rim -->
<circle cx="86" cy="96" r="52" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>

<!-- ── Americas: bold green dots (left half) ── -->
<g clip-path="url(#cp-g)" filter="url(#f-dot)">
  <!-- North America - 6 big dots -->
  <circle cx="67" cy="70" r="4"   fill="#10b981"/>
  <circle cx="60" cy="80" r="3.2" fill="#10b981"/>
  <circle cx="73" cy="78" r="2.8" fill="#10b981"/>
  <circle cx="63" cy="89" r="3.5" fill="#10b981"/>
  <circle cx="56" cy="93" r="2.5" fill="#10b981"/>
  <!-- South America - 5 big dots -->
  <circle cx="66" cy="100" r="3.2" fill="#10b981"/>
  <circle cx="61" cy="108" r="4"   fill="#10b981"/>
  <circle cx="69" cy="110" r="2.8" fill="#10b981"/>
  <circle cx="63" cy="118" r="3.5" fill="#10b981"/>
  <circle cx="71" cy="120" r="2.2" fill="#10b981"/>
</g>

<!-- ── Europe/Africa: orange network (right half) ── -->
<g clip-path="url(#cp-g)" filter="url(#f-dot)">
  <!-- 8 dots -->
  <circle cx="100" cy="70"  r="3.5" fill="#f97316"/>
  <circle cx="111" cy="67"  r="2.8" fill="#f97316"/>
  <circle cx="118" cy="73"  r="2.2" fill="#f97316"/>
  <circle cx="105" cy="82"  r="3"   fill="#f97316"/>
  <circle cx="115" cy="81"  r="3.5" fill="#f97316"/>
  <circle cx="108" cy="93"  r="3"   fill="#f97316"/>
  <circle cx="118" cy="96"  r="2.5" fill="#f97316"/>
  <circle cx="112" cy="107" r="3.5" fill="#f97316"/>
  <circle cx="121" cy="110" r="2.5" fill="#f97316"/>
  <!-- Network lines -->
  <line x1="100" y1="70"  x2="111" y2="67"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="111" y1="67"  x2="118" y2="73"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="111" y1="67"  x2="105" y2="82"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="105" y1="82"  x2="115" y2="81"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="115" y1="81"  x2="108" y2="93"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="108" y1="93"  x2="118" y2="96"  stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="108" y1="93"  x2="112" y2="107" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <line x1="112" y1="107" x2="121" y2="110" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
</g>

<!-- ── C arc — BOLD ── -->
<!-- Arc center ≈(86,96), radius 63, start/end at x≈138.4, y=61/131 -->
<path d="M 138,62 A 63,63 0 1,0 138,130"
      fill="none" stroke="url(#g-arc)" stroke-width="14"
      stroke-linecap="round" filter="url(#f-arc)"/>

<!-- ── R vertical bar — BOLD ── -->
<rect x="128" y="54" width="13" height="62" rx="3" fill="url(#g-r)"/>

<!-- ── R bump ── -->
<path d="M 141,54 C 165,54 170,64 170,72 C 170,82 163,91 141,91"
      fill="none" stroke="url(#g-r)" stroke-width="12"
      stroke-linecap="round" stroke-linejoin="round"/>

<!-- ── Rising bars (replace R diagonal) ── -->
<rect x="131" y="95"  width="10" height="21" rx="2.5" fill="url(#g-bar)"/>
<rect x="143" y="87"  width="10" height="29" rx="2.5" fill="url(#g-bar)"/>
<rect x="155" y="78"  width="10" height="38" rx="2.5" fill="url(#g-bar)"/>
<rect x="167" y="68"  width="10" height="48" rx="2.5" fill="url(#g-bar)"/>

</svg>
