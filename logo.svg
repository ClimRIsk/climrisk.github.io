<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <radialGradient id="gGlobe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="gGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="80" cy="80" r="64"/>
    </clipPath>
  </defs>

  <!-- Glow halo -->
  <circle cx="80" cy="80" r="76" fill="url(#gGlow)"/>

  <!-- Globe background -->
  <circle cx="80" cy="80" r="64" fill="url(#gGlobe)"/>
  <circle cx="80" cy="80" r="64" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>

  <!-- Globe grid lines clipped to circle -->
  <g clip-path="url(#circleClip)" opacity="0.35">
    <!-- Latitude lines -->
    <ellipse cx="80" cy="80" rx="64" ry="22" fill="none" stroke="#10b981" stroke-width="1"/>
    <ellipse cx="80" cy="80" rx="64" ry="44" fill="none" stroke="#10b981" stroke-width="0.75"/>
    <line x1="16" y1="80" x2="144" y2="80" stroke="#10b981" stroke-width="0.75"/>
    <!-- Meridians -->
    <ellipse cx="80" cy="80" rx="22" ry="64" fill="none" stroke="#10b981" stroke-width="0.75"/>
    <ellipse cx="80" cy="80" rx="44" ry="64" fill="none" stroke="#10b981" stroke-width="0.75"/>
    <line x1="80" y1="16" x2="80" y2="144" stroke="#10b981" stroke-width="0.75"/>
  </g>

  <!-- Risk trend arrow (climate risk going up) -->
  <g clip-path="url(#circleClip)">
    <polyline points="30,110 52,88 68,98 95,62 118,70 142,40"
              fill="none" stroke="#10b981" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <polygon points="142,40 130,36 134,50" fill="#10b981"/>
    <!-- Data dots -->
    <circle cx="52" cy="88" r="3.5" fill="#10b981"/>
    <circle cx="68" cy="98" r="3.5" fill="#10b981"/>
    <circle cx="95" cy="62" r="3.5" fill="#10b981"/>
    <circle cx="118" cy="70" r="3.5" fill="#10b981"/>
  </g>

  <!-- Wordmark -->
  <!-- "Clim" in light -->
  <text x="164" y="74" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="44" font-weight="800" fill="#f1f5f9" letter-spacing="-1.5">Clim</text>
  <!-- "Risk" in emerald -->
  <text x="278" y="74" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="44" font-weight="800" fill="#10b981" letter-spacing="-1.5">Risk</text>
  <!-- Tagline -->
  <text x="165" y="102" font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="12.5" font-weight="500" fill="#64748b" letter-spacing="3.5">CLIMATE INTELLIGENCE</text>
</svg>
