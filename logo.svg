<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
  <!-- C arc: emerald → blue → indigo -->
  <linearGradient id="lg-arc" x1="0.3" y1="0" x2="0.7" y2="1">
    <stop offset="0%"   stop-color="#10b981"/>
    <stop offset="52%"  stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <!-- Globe: dark navy radial -->
  <radialGradient id="lg-globe" cx="38%" cy="36%" r="68%">
    <stop offset="0%"   stop-color="#0d1f3c"/>
    <stop offset="100%" stop-color="#010914"/>
  </radialGradient>
  <!-- R letterform: light-blue → deep-blue -->
  <linearGradient id="lg-r" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#93c5fd"/>
    <stop offset="100%" stop-color="#1d4ed8"/>
  </linearGradient>
  <!-- Rising bars: dark-green → light-green -->
  <linearGradient id="lg-bar" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#059669"/>
    <stop offset="100%" stop-color="#6ee7b7"/>
  </linearGradient>
  <!-- Arc outer glow -->
  <filter id="f-arc-glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Dot glow -->
  <filter id="f-dot-glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Globe clip -->
  <clipPath id="cp-globe">
    <circle cx="87" cy="96" r="52"/>
  </clipPath>
  <!-- Globe divider: clip left half only (Americas) -->
  <clipPath id="cp-left">
    <rect x="0" y="0" width="87" height="200"/>
  </clipPath>
  <!-- Globe right half (Europe/Africa) -->
  <clipPath id="cp-right">
    <rect x="87" y="0" width="113" height="200"/>
  </clipPath>
</defs>

<!-- ── Globe ── -->
<circle cx="87" cy="96" r="52" fill="url(#lg-globe)"/>
<!-- subtle globe rim glow -->
<circle cx="87" cy="96" r="52" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>

<!-- Americas: green dots (left half of globe) -->
<g clip-path="url(#cp-globe)" filter="url(#f-dot-glow)">
  <!-- North America -->
  <circle cx="68" cy="70" r="2.3" fill="#10b981"/>
  <circle cx="61" cy="78" r="1.6" fill="#10b981"/>
  <circle cx="74" cy="76" r="1.5" fill="#10b981"/>
  <circle cx="63" cy="85" r="2.1" fill="#10b981"/>
  <circle cx="73" cy="87" r="1.3" fill="#10b981"/>
  <circle cx="57" cy="91" r="1.6" fill="#10b981"/>
  <!-- Central America -->
  <circle cx="67" cy="96" r="1.8" fill="#10b981"/>
  <!-- South America -->
  <circle cx="62" cy="103" r="2.2" fill="#10b981"/>
  <circle cx="70" cy="106" r="1.5" fill="#10b981"/>
  <circle cx="64" cy="113" r="2.3" fill="#10b981"/>
  <circle cx="72" cy="115" r="1.5" fill="#10b981"/>
  <circle cx="66" cy="120" r="1.2" fill="#10b981"/>
</g>

<!-- Europe/Africa: orange network (right half of globe) -->
<g clip-path="url(#cp-globe)" filter="url(#f-dot-glow)">
  <!-- Dots -->
  <circle cx="100" cy="71" r="1.9" fill="#f97316"/>
  <circle cx="109" cy="67" r="1.5" fill="#f97316"/>
  <circle cx="117" cy="71" r="1.2" fill="#f97316"/>
  <circle cx="104" cy="80" r="1.7" fill="#f97316"/>
  <circle cx="113" cy="78" r="1.9" fill="#f97316"/>
  <circle cx="120" cy="83" r="1.3" fill="#f97316"/>
  <circle cx="107" cy="89" r="1.7" fill="#f97316"/>
  <circle cx="116" cy="92" r="2.1" fill="#f97316"/>
  <circle cx="124" cy="88" r="1.3" fill="#f97316"/>
  <circle cx="110" cy="99" r="1.7" fill="#f97316"/>
  <circle cx="119" cy="102" r="1.5" fill="#f97316"/>
  <circle cx="112" cy="109" r="2.1" fill="#f97316"/>
  <circle cx="120" cy="113" r="1.5" fill="#f97316"/>
  <!-- Network lines -->
  <line x1="100" y1="71"  x2="109" y2="67"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="109" y1="67"  x2="117" y2="71"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="109" y1="67"  x2="104" y2="80"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="104" y1="80"  x2="113" y2="78"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="113" y1="78"  x2="120" y2="83"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="113" y1="78"  x2="116" y2="92"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="116" y1="92"  x2="124" y2="88"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="116" y1="92"  x2="110" y2="99"  stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="110" y1="99"  x2="119" y2="102" stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="110" y1="99"  x2="112" y2="109" stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
  <line x1="112" y1="109" x2="120" y2="113" stroke="#f97316" stroke-width="0.7" opacity="0.4"/>
</g>

<!-- ── C arc ── -->
<!-- Arc center: ~(87,96), radius 62, gap on the right (arc from top-right to bottom-right, going left) -->
<!-- Start: (87+62*cos(-34°), 96+62*sin(-34°)) ≈ (138.4, 61.3) -->
<!-- End:   (138.4, 130.7) -->
<path d="M 138.4,61.3 A 62,62 0 1,0 138.4,130.7"
      fill="none" stroke="url(#lg-arc)" stroke-width="11"
      stroke-linecap="round" filter="url(#f-arc-glow)"/>

<!-- ── R letterform ── -->
<!-- Vertical bar -->
<rect x="129" y="54" width="10.5" height="62" rx="2.5" fill="url(#lg-r)"/>
<!-- R bump (cubic bezier — top right of R) -->
<path d="M 139.5,54 C 162,54 167,63 167,72 C 167,82 161,90 139.5,90"
      fill="none" stroke="url(#lg-r)" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- ── Rising bars (replace R diagonal leg) ── -->
<rect x="131" y="94"  width="7.5" height="22" rx="2" fill="url(#lg-bar)"/>
<rect x="140" y="87"  width="7.5" height="29" rx="2" fill="url(#lg-bar)"/>
<rect x="149" y="79"  width="7.5" height="37" rx="2" fill="url(#lg-bar)"/>
<rect x="158" y="70"  width="7.5" height="46" rx="2" fill="url(#lg-bar)"/>

</svg>
