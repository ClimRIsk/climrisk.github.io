<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420">
<defs>
  <!-- C arc gradient: emerald → blue → indigo -->
  <linearGradient id="g-arc" x1="0.25" y1="0" x2="0.75" y2="1">
    <stop offset="0%"   stop-color="#10b981"/>
    <stop offset="45%"  stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#4338ca"/>
  </linearGradient>
  <!-- Globe: deep navy radial -->
  <radialGradient id="g-globe" cx="36%" cy="33%" r="72%">
    <stop offset="0%"   stop-color="#0d2040"/>
    <stop offset="100%" stop-color="#010812"/>
  </radialGradient>
  <!-- R letterform: sky-blue → deep-blue -->
  <linearGradient id="g-r" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#7dd3fc"/>
    <stop offset="100%" stop-color="#1d4ed8"/>
  </linearGradient>
  <!-- Rising bars: dark-green → bright-green -->
  <linearGradient id="g-bar" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#047857"/>
    <stop offset="100%" stop-color="#34d399"/>
  </linearGradient>
  <!-- "Clim" text: white/silver -->
  <linearGradient id="g-clim" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#c8d8f0"/>
  </linearGradient>
  <!-- "Risk" text: green → blue -->
  <linearGradient id="g-risk" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#10b981"/>
    <stop offset="60%"  stop-color="#3b82f6"/>
    <stop offset="100%" stop-color="#1d4ed8"/>
  </linearGradient>
  <!-- Separator line -->
  <linearGradient id="g-sep" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#10b981" stop-opacity="0"/>
    <stop offset="35%"  stop-color="#10b981"/>
    <stop offset="50%"  stop-color="#3b82f6"/>
    <stop offset="65%"  stop-color="#ef4444"/>
    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
  </linearGradient>
  <!-- Arc glow filter -->
  <filter id="f-arc" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Dot glow -->
  <filter id="f-dot" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- R glow -->
  <filter id="f-r" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Globe clip -->
  <clipPath id="cp-g">
    <circle cx="185" cy="108" r="85"/>
  </clipPath>
</defs>

<!-- ── Background ── -->
<rect width="400" height="420" fill="#050c1a"/>

<!-- ── Globe base ── -->
<circle cx="185" cy="108" r="85" fill="url(#g-globe)"/>
<circle cx="185" cy="108" r="85" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.2"/>

<!-- ── Americas: green dots (left half) ── -->
<g clip-path="url(#cp-g)" filter="url(#f-dot)">
  <circle cx="143" cy="78"  r="5.5" fill="#10b981"/>
  <circle cx="133" cy="92"  r="4.2" fill="#10b981"/>
  <circle cx="152" cy="88"  r="3.8" fill="#10b981"/>
  <circle cx="137" cy="103" r="5"   fill="#10b981"/>
  <circle cx="128" cy="110" r="3.5" fill="#10b981"/>
  <circle cx="147" cy="113" r="3"   fill="#10b981"/>
  <circle cx="139" cy="123" r="5"   fill="#10b981"/>
  <circle cx="132" cy="133" r="6"   fill="#10b981"/>
  <circle cx="147" cy="136" r="4"   fill="#10b981"/>
  <circle cx="138" cy="147" r="5.5" fill="#10b981"/>
  <circle cx="152" cy="148" r="3.5" fill="#10b981"/>
  <circle cx="142" cy="158" r="3"   fill="#10b981"/>
</g>

<!-- ── Europe/Africa: orange network (right half) ── -->
<g clip-path="url(#cp-g)" filter="url(#f-dot)">
  <circle cx="200" cy="76"  r="5"   fill="#f97316"/>
  <circle cx="215" cy="71"  r="3.8" fill="#f97316"/>
  <circle cx="226" cy="78"  r="3"   fill="#f97316"/>
  <circle cx="207" cy="89"  r="4.5" fill="#f97316"/>
  <circle cx="220" cy="88"  r="5"   fill="#f97316"/>
  <circle cx="230" cy="94"  r="3.2" fill="#f97316"/>
  <circle cx="212" cy="101" r="4"   fill="#f97316"/>
  <circle cx="223" cy="104" r="5"   fill="#f97316"/>
  <circle cx="234" cy="100" r="3"   fill="#f97316"/>
  <circle cx="216" cy="115" r="4.5" fill="#f97316"/>
  <circle cx="227" cy="119" r="3.8" fill="#f97316"/>
  <circle cx="220" cy="130" r="5"   fill="#f97316"/>
  <circle cx="232" cy="133" r="3.5" fill="#f97316"/>
  <!-- Network lines -->
  <line x1="200" y1="76"  x2="215" y2="71"  stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="71"  x2="226" y2="78"  stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="71"  x2="207" y2="89"  stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="207" y1="89"  x2="220" y2="88"  stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="88"  x2="230" y2="94"  stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="88"  x2="223" y2="104" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="223" y1="104" x2="234" y2="100" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="223" y1="104" x2="216" y2="115" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="216" y1="115" x2="227" y2="119" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="216" y1="115" x2="220" y2="130" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="130" x2="232" y2="133" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
</g>

<!-- ── C arc — thick glow ── -->
<!-- Arc center ≈(185,108), radius 104, gap on right (~68°) -->
<!-- Start: x=185+104·cos(-34°)≈271, y=108+104·sin(-34°)≈50 -->
<!-- End:   x≈271, y≈166 -->
<path d="M 271,51 A 104,104 0 1,0 271,165"
      fill="none" stroke="url(#g-arc)" stroke-width="20"
      stroke-linecap="round" filter="url(#f-arc)"/>

<!-- ── R vertical bar ── -->
<rect x="254" y="43" width="21" height="100" rx="5" fill="url(#g-r)" filter="url(#f-r)"/>

<!-- ── R bump (top-right curve) ── -->
<path d="M 275,43 C 318,43 326,61 326,76 C 326,92 316,109 275,109"
      fill="none" stroke="url(#g-r)" stroke-width="19"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#f-r)"/>

<!-- ── Rising bars (lower R) ── -->
<rect x="258" y="115" width="15" height="28" rx="3.5" fill="url(#g-bar)" filter="url(#f-dot)"/>
<rect x="276" y="104" width="15" height="39" rx="3.5" fill="url(#g-bar)" filter="url(#f-dot)"/>
<rect x="294" y="91"  width="15" height="52" rx="3.5" fill="url(#g-bar)" filter="url(#f-dot)"/>
<rect x="312" y="76"  width="15" height="67" rx="3.5" fill="url(#g-bar)" filter="url(#f-dot)"/>

<!-- ── "ClimRisk" wordmark ── -->
<text x="200" y="242"
      font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="82" font-weight="900" text-anchor="middle"
      letter-spacing="-3">
  <tspan fill="url(#g-clim)">Clim</tspan><tspan fill="url(#g-risk)">Risk</tspan>
</text>

<!-- ── Separator line ── -->
<line x1="60" y1="266" x2="340" y2="266" stroke="url(#g-sep)" stroke-width="1.5"/>
<!-- Dot on separator -->
<circle cx="200" cy="266" r="4" fill="#3b82f6"/>
<circle cx="200" cy="266" r="7" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

<!-- ── 4 badges ── -->
<!-- Climate Intelligence -->
<g transform="translate(22,280)">
  <!-- leaf icon -->
  <path d="M8,14 C8,8 14,4 14,4 C14,4 14,10 10,13 C8,14.5 6,14 6,14 Z" fill="#10b981" stroke="none"/>
  <text x="22" y="10" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#10b981" letter-spacing="0.5">CLIMATE</text>
  <text x="22" y="22" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#10b981" letter-spacing="0.5">INTELLIGENCE</text>
</g>
<!-- separator -->
<line x1="117" y1="283" x2="117" y2="306" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<!-- Risk Assessment -->
<g transform="translate(122,280)">
  <!-- shield icon -->
  <path d="M8,2 L14,5 L14,11 C14,14 11,16 8,17 C5,16 2,14 2,11 L2,5 Z" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M5.5,9.5 L7.5,11.5 L11,7" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <text x="22" y="10" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#3b82f6" letter-spacing="0.5">RISK</text>
  <text x="22" y="22" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#3b82f6" letter-spacing="0.5">ASSESSMENT</text>
</g>
<!-- separator -->
<line x1="218" y1="283" x2="218" y2="306" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<!-- Data Insights -->
<g transform="translate(222,280)">
  <!-- bars icon -->
  <rect x="2"  y="10" width="4" height="7" rx="1" fill="#818cf8"/>
  <rect x="7"  y="6"  width="4" height="11" rx="1" fill="#818cf8"/>
  <rect x="12" y="2"  width="4" height="15" rx="1" fill="#818cf8"/>
  <text x="22" y="10" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#818cf8" letter-spacing="0.5">DATA</text>
  <text x="22" y="22" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#818cf8" letter-spacing="0.5">INSIGHTS</text>
</g>
<!-- separator -->
<line x1="305" y1="283" x2="305" y2="306" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<!-- Resilient Decisions -->
<g transform="translate(310,280)">
  <!-- target icon -->
  <circle cx="8" cy="9.5" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="8" cy="9.5" r="4" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
  <circle cx="8" cy="9.5" r="1.5" fill="#f59e0b"/>
  <text x="22" y="8" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f59e0b" letter-spacing="0.5">RESILIENT</text>
  <text x="22" y="20" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#f59e0b" letter-spacing="0.5">DECISIONS</text>
</g>

<!-- ── Tagline ── -->
<text x="200" y="348"
      font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="12.5" font-weight="500" text-anchor="middle"
      letter-spacing="4" fill="none">
  <!-- plain -->
</text>
<text x="200" y="350"
      font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
      font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3.5">
  <tspan fill="rgba(255,255,255,0.7)">UNDERSTAND </tspan><tspan fill="#10b981">TODAY.</tspan><tspan fill="rgba(255,255,255,0.7)"> PREPARE </tspan><tspan fill="#f97316">TOMORROW.</tspan>
</text>

</svg>
